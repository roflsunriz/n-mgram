name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Lint, test, and web build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run check

  desktop:
    name: Windows desktop compile
    needs: quality
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: bun install --frozen-lockfile
      - run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check
      - run: bun run tauri build --no-bundle

  android:
    name: Android APK compile
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v4
        with:
          packages: 'platform-tools platforms;android-36 build-tools;36.0.0 ndk;29.0.14206865'
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: bun install --frozen-lockfile
      - run: bun run tauri android build --debug --apk --target aarch64 --ci
