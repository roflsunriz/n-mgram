name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing vX.Y.Z tag to build and publish
        required: true
        type: string

env:
  RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    name: Validate release source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Verify tag and project versions
        shell: bash
        run: |
          tag_version="${RELEASE_TAG#v}"
          tauri_version=$(jq -r '.version' src-tauri/tauri.conf.json)
          package_version=$(jq -r '.version' package.json)
          cargo_version=$(sed -n 's/^version = "\([^"]*\)"$/\1/p' src-tauri/Cargo.toml | head -n 1)
          test "$tag_version" = "$tauri_version"
          test "$tag_version" = "$package_version"
          test "$tag_version" = "$cargo_version"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run check

  release-windows:
    name: Signed Windows release
    needs: validate
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Keep repository files as LF
        run: git config --global core.autocrlf false
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Restore Bun download cache
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Build signed release and updater metadata
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: bun run tauri
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: n-mgram ${{ env.RELEASE_TAG }}
          releaseBody: |
            変更内容は CHANGELOG.md を参照してください。
          releaseDraft: false
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
          generateReleaseNotes: true
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          uploadUpdaterSignatures: true

  build-android:
    name: Build signed Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Keep repository files as LF
        run: git config --global core.autocrlf false
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
          cache-dependency-path: |
            src-tauri/gen/android/**/*.gradle*
            src-tauri/gen/android/**/gradle-wrapper.properties
      - uses: android-actions/setup-android@v4
        with:
          packages: 'platform-tools platforms;android-36 build-tools;36.0.0 ndk;29.0.14206865'
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Configure Android release signing
        env:
          ANDROID_KEY_BASE64: ${{ secrets.ANDROID_KEY_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$ANDROID_KEY_BASE64"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"
          printf '%s' "$ANDROID_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/n-mgram-android.jks"
          printf 'password=%s\nkeyAlias=%s\nstoreFile=%s\n' \
            "$ANDROID_KEY_PASSWORD" \
            "$ANDROID_KEY_ALIAS" \
            "$RUNNER_TEMP/n-mgram-android.jks" \
            > src-tauri/gen/android/keystore.properties

      - name: Build signed APK
        run: bun run tauri android build --apk --target aarch64 armv7 --ci

      - name: Prepare APK and checksum
        id: apk
        shell: bash
        run: |
          source_apk=$(find src-tauri/gen/android/app/build/outputs/apk -type f -name '*.apk' | head -n 1)
          test -n "$source_apk"
          output_apk="n-mgram-${{ env.RELEASE_TAG }}-android.apk"
          cp "$source_apk" "$output_apk"
          sha256sum "$output_apk" > "$output_apk.sha256"
          echo "path=$output_apk" >> "$GITHUB_OUTPUT"

      - name: Preserve APK until the Windows release exists
        uses: actions/upload-artifact@v7
        with:
          name: signed-android-apk
          path: |
            ${{ steps.apk.outputs.path }}
            ${{ steps.apk.outputs.path }}.sha256
          if-no-files-found: error
          retention-days: 2

  publish-android:
    name: Attach Android APK to release
    needs: [release-windows, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: signed-android-apk
          path: android-release
      - name: Upload APK to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$RELEASE_TAG" android-release/*.apk android-release/*.sha256 --clobber
