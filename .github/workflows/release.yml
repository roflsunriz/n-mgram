name: Release

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release-windows:
    name: Signed Windows release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify tag and project versions
        shell: pwsh
        run: |
          $tagVersion = '${{ github.ref_name }}'.TrimStart('v')
          $tauriVersion = (Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json).version
          $packageVersion = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $cargoVersion = (Select-String -Path src-tauri/Cargo.toml -Pattern '^version = "([^"]+)"$').Matches[0].Groups[1].Value
          if ($tagVersion -ne $tauriVersion -or $tagVersion -ne $packageVersion -or $tagVersion -ne $cargoVersion) {
            throw "Tag v$tagVersion does not match tauri=$tauriVersion package=$packageVersion cargo=$cargoVersion"
          }

      - name: Run quality checks
        shell: pwsh
        run: |
          cargo fmt --manifest-path src-tauri/Cargo.toml -- --check
          bun run check

      - name: Build signed release and updater metadata
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: bun run tauri
          tagName: ${{ github.ref_name }}
          releaseName: n-mgram ${{ github.ref_name }}
          releaseBody: |
            変更内容は CHANGELOG.md を参照してください。
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generateReleaseNotes: true
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          uploadUpdaterSignatures: true

  release-android:
    name: Signed Android APK release
    needs: release-windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v4
        with:
          packages: 'platform-tools platforms;android-36 build-tools;36.0.0 ndk;29.0.14206865'
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Configure Android release signing
        env:
          ANDROID_KEY_BASE64: ${{ secrets.ANDROID_KEY_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "$ANDROID_KEY_BASE64"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"
          printf '%s' "$ANDROID_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/n-mgram-android.jks"
          printf 'password=%s\nkeyAlias=%s\nstoreFile=%s\n' \
            "$ANDROID_KEY_PASSWORD" \
            "$ANDROID_KEY_ALIAS" \
            "$RUNNER_TEMP/n-mgram-android.jks" \
            > src-tauri/gen/android/keystore.properties

      - name: Build signed APK
        run: bun run tauri android build --apk --target aarch64 armv7 --ci

      - name: Prepare APK and checksum
        id: apk
        shell: bash
        run: |
          source_apk=$(find src-tauri/gen/android/app/build/outputs/apk -type f -name '*.apk' | head -n 1)
          test -n "$source_apk"
          output_apk="n-mgram-${{ github.ref_name }}-android.apk"
          cp "$source_apk" "$output_apk"
          sha256sum "$output_apk" > "$output_apk.sha256"
          echo "path=$output_apk" >> "$GITHUB_OUTPUT"

      - name: Upload APK to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" "${{ steps.apk.outputs.path }}" "${{ steps.apk.outputs.path }}.sha256" --clobber
